<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeQuest - Python Master</title>
    <style>
        body {
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(135deg, #ffe4ec, #ffd6e8, #fce7f3);
  color: #0f172a;
  font-family: Arial, sans-serif;
}
 body {
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(135deg, #fff7fb, #ffe4ec, #fef2f2);
  font-family: Arial, sans-serif;
  color: #0f172a;
}

/* Level cards */
div {
  background: rgba(255, 255, 255, 0.85);
  border-radius: 16px;
  padding: 16px;
  margin: 12px 0;
  box-shadow: 0 8px 25px rgba(255, 105, 180, 0.15);
  transition: 0.3s;
  position: relative;
  overflow: hidden;
}

/* hover glow */
div:hover {
  transform: translateY(-6px);
  box-shadow: 0 12px 35px rgba(255, 105, 180, 0.25);
}

/* soft pink glow effect (instead of green) */
div::before {
  content: "";
  position: absolute;
  width: 120px;
  height: 120px;
  background: rgba(255, 182, 193, 0.4);
  filter: blur(45px);
  top: -30px;
  right: -30px;
}
    </style>
</head>
<body>

    <div class="game-box" id="main-box">
        <div class="level-indicator" id="levelTitle">LEVEL 1</div>
        <p id="questionText">Which symbol is used for comments in Python?</p>
        <input type="text" id="answerInput" placeholder="Type your answer here..." autocomplete="off">
        <br>
        <button onclick="checkAnswer()">Submit Answer</button>
        <p id="message"></p>
    </div>

    <script>
        let currentLevel = 1;

        // Python Questions and Answers (English)
        const levels = {
            1: { q: "Which symbol is used for comments in Python?", a: "#" },
            2: { q: "Is '2myvar' a valid variable name? (yes/no)", a: "no" },
            3: { q: "What is the output of: print(10 > 9)?", a: "true" },
            4: { q: "Which brackets are used for a List? (square/round)", a: "square" },
            5: { q: "What is the file extension for Python files?", a: ".py" },
            6: { q: "What is the output of: len('Hello')?", a: "5" },
            7: { q: "Which keyword is used to create a function?", a: "def" },
            8: { q: "What is the data type of 10.5?", a: "float" },
            9: { q: "Which method is used to add an item to a list?", a: "append" },
            10: { q: "Who created Python? (Guido/Bill)", a: "Guido" }
        };

        // Allow pressing 'Enter' key to submit
        document.getElementById("answerInput").addEventListener("keyup", function(event) {
            if (event.key === "Enter") {
                checkAnswer();
            }
        });

        function checkAnswer() {
            const userInput = document.getElementById('answerInput');
            const userAnswer = userInput.value.toLowerCase().trim();
            const correctAnswer = levels[currentLevel].a.toLowerCase();
            const msg = document.getElementById('message');

            if (userAnswer === correctAnswer) {
                if (currentLevel < 10) {
                    currentLevel++;
                    msg.innerText = "Correct! Well done. Level " + currentLevel + " is here!";
                    msg.style.color = "#ffff00"; // Yellow for success
                    updateLevel();
                } else {
                    document.getElementById('main-box').innerHTML = "<h1>🎉 CONGRATULATIONS! 🎉</h1><p>You have mastered the Python CodeQuest!</p><button onclick='location.href=\"index.html\"'>Restart Game</button>";
                }
            } else {
                msg.innerText = "Incorrect! Please try again.";
                msg.style.color = "#ff4444"; // Red for wrong answer
            }
            userInput.value = ""; // Clear input for next try
            userInput.focus();
        }

        function updateLevel() {
            document.getElementById('levelTitle').innerText = "LEVEL " + currentLevel;
            document.getElementById('questionText').innerText = levels[currentLevel].q;
        }
    </script>
</body>
</html>

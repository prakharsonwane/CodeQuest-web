<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeQuest - Login</title>
   <style>
   body {
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(135deg, #ffe4ec, #ffd6e8, #fce7f3);
  color: #0f172a;
  font-family: Arial, sans-serif;
}
</style>
</head>
<body>

<div class="login-container">
    <h2>Welcome to CodeQuest</h2>
    <form id="loginForm">
        <input type="text" id="username" placeholder="Username (admin)" required>
        <input type="password" id="password" placeholder="Password (1234)" required>
        <button type="submit">Start Quest</button>
    </form>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        if(user === "admin" && pass === "1234") {
            alert("Login Successful!");
            window.location.href = "game.html"; // Ye game page par bhej dega
        } else {
            alert("Invalid Username or Password!");
        }
    });
</script>

</body>
</html>

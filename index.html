<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeQuest - Login</title>
   <style>
    body {
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(-45deg, #0f172a, #1e293b, #0b1220, #111827);
  background-size: 400% 400%;
  animation: gradientBG 12s ease infinite;
  color: white;
}

@keyframes gradientBG {
  0% {
    background-position: 0% 50%;
  }
  50% {
    background-position: 100% 50%;
  }
  100% {
    background-position: 0% 50%;
  }
}
</style>
</head>
<body>

<div class="login-container">
    <h2>Welcome to CodeQuest</h2>
    <form id="loginForm">
        <input type="text" id="username" placeholder="Username (admin)" required>
        <input type="password" id="password" placeholder="Password (1234)" required>
        <button type="submit">Start Quest</button>
    </form>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        if(user === "admin" && pass === "1234") {
            alert("Login Successful!");
            window.location.href = "game.html"; // Ye game page par bhej dega
        } else {
            alert("Invalid Username or Password!");
        }
    });
</script>

</body>
</html>
